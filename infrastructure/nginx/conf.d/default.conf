server
{
    listen 80;
    listen [::]:80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server
{
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localhost;
    ssl_certificate /etc/nginx/certs/transcendence.crt; 
    ssl_certificate_key /etc/nginx/certs/transcendence.key;

    modsecurity on;
    modsecurity_rules 'SecAuditEngine On
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity.log
';

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    resolver 127.0.0.11 ipv6=off valid=10s;

    location /
    {
        set $front_upstream http://front:3003;
        proxy_pass $front_upstream;

    }
    location /api/auth/
    {
        set $auth_upstream http://auth:3004;
        proxy_pass $auth_upstream/api/auth/;
    }
    location /api/chat/
    {
        set $chat_upstream http://chat:3001;
        proxy_pass $chat_upstream/api/chat/;
    }
    location /api/users/
    {
        set $user_upstream http://user:3002;
        proxy_pass $user_upstream/api/users/;
    }
    location /api/listings/
    {
        set $listings_upstream http://listings:3005;
        proxy_pass $listings_upstream/api/listings/;
    }

}
