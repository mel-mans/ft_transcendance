apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: {{ .Values.global.namespace }} # Always include this!
spec:
  type: NodePort
  selector:
    app: nginx # Ensure your Nginx Pod has 'labels: app: nginx'
  ports:
    - name: https
      protocol: TCP
      port: {{ .Values.nginx.service.port }}
      targetPort: {{ .Values.nginx.service.port }}
      nodePort: 30443 # Reachable via https://localhost:30443
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080 # Reachable via http://localhost:30080